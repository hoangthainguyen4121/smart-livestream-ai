# Railway — Frontend service (nginx static production build)
# Point this file in Railway: Service → Settings → Config-as-code → railway.toml path
# Root directory for this service: / (repository root)

[build]
builder = "DOCKERFILE"
dockerfilePath = "frontend/Dockerfile"
dockerfileTarget = "production"
watchPatterns = ["frontend/**"]

[deploy]
healthcheckPath = "/health.txt"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
numReplicas = 1
