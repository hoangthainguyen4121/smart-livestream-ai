services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}
      ENABLE_WAVE_GESTURE: ${ENABLE_WAVE_GESTURE:-false}
      # Optional PhoBERT bridge (separate smart-livestream-ml repo). When ML runs on the host:
      ML_INTENT_API_URL: ${ML_INTENT_API_URL:-http://host.docker.internal:8010}
      ML_INTENT_TIMEOUT_SECONDS: ${ML_INTENT_TIMEOUT_SECONDS:-2}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./storage/embeddings:/app/storage/embeddings
      - ./logs:/app/logs
      - insightface_models:/root/.insightface
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  insightface_models:
  frontend_node_modules:
